<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Access</title>
    <style>
        body {
            margin: 0;
            background: black;
            color: #00ff00;
            font-family: monospace;
            overflow: hidden;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }
        #terminal {
            padding: 20px;
            font-size: 14px;
        }
        .warning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: red;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
            animation: flash 1s infinite;
        }
        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        .progress {
            width: 80%;
            height: 20px;
            border: 2px solid #00ff00;
            margin: 20px auto;
        }
        .bar {
            height: 100%;
            width: 0%;
            background: #00ff00;
        }
        .shake {
            animation: shake 0.3s infinite;
        }
        @keyframes shake {
            0% { transform: translate(3px, 3px); }
            25% { transform: translate(-3px, -3px); }
            50% { transform: translate(3px, -3px); }
            75% { transform: translate(-3px, 3px); }
            100% { transform: translate(3px, 3px); }
        }
        #april {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            color: yellow;
            font-size: 70px;
            justify-content: center;
            align-items: center;
            text-align: center;
            animation: pop 1s infinite alternate;
        }
        @keyframes pop {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }
    </style>
    <script>
        let start = Date.now();
        while (Date.now() - start < 300000) {}
    </script>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div id="terminal"></div>
    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>
    <div id="april">😂 APRIL FOOL 😂</div>
    <h1>wishing you a nice day</h1>
    <b>CREATED BY: <span style="color:green;">MOHIB ULLAH</span></b>
    <audio id="alarm" loop>
        <source src="https://www.soundjay.com/misc/sounds/alarm-clock-01.mp3">
    </audio>
    <script>
        let text = [
            "Connecting to satellite...",
            "Accessing device files...",
            "Tracking GPS location...",
            "Scanning contacts...",
            "Scanning photos...",
            "Uploading file: IMG_2034.jpg → remote server...",
            "Uploading file: IMG_2035.jpg → remote server...",
            "Uploading file: camera_video.mp4 → remote server...",
            "Uploading gallery photos (1/5)...",
            "Uploading gallery photos (2/5)...",
            "Uploading gallery photos (3/5)...",
            "Uploading gallery photos (4/5)...",
            "Uploading gallery photos (5/5)...",
            "Extracting private files...",
            "Uploading documents: bank_info.pdf...",
            "Uploading documents: passwords.txt...",
            "Injecting security exploit...",
            "Bypassing firewall...",
            "Device control established...",
            "Preparing system lock..."
        ];
        let i = 0;
        let terminal = document.getElementById("terminal");

        function type() {
            if (i < text.length) {
                terminal.innerHTML += text[i] + "<br>";
                i++;
                setTimeout(type, 800);
            }
        }
        type();

        let bar = document.getElementById("bar");
        let progress = 0;
        let interval = setInterval(() => {
            progress += 5;
            bar.style.width = progress + "%";
            if (progress > 50) {
                document.body.classList.add("shake");
                document.getElementById("alarm").play();
            }
            if (progress >= 100) {
                clearInterval(interval);
                document.body.innerHTML = "<div class='warning'>FBI WARNING<br>DEVICE LOCKED</div>";
                setTimeout(() => {
                    document.getElementById("april").style.display = "flex";
                }, 4000);
            }
        }, 300);

        let canvas = document.getElementById("matrix");
        let ctx = canvas.getContext("2d");
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;
        let letters = "01".split("");
        let fontSize = 14;
        let columns = canvas.width / fontSize;
        let drops = [];
        for (let x = 0; x < columns; x++) drops[x] = 1;

        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                let text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);
    </script>
</body>
</html>
